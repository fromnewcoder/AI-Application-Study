<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude · Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ── Reset & tokens ──────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0d11;
    --surface:   #111318;
    --border:    #1e2230;
    --accent:    #e8b86d;
    --accent2:   #6dc8e8;
    --text:      #d4d8e2;
    --text-dim:  #5a6075;
    --user-bg:   #161a24;
    --asst-bg:   #0f1117;
    --radius:    14px;
    --font-ui:   'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --glow:      0 0 24px rgba(232,184,109,.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ──────────────────────────────────────────────────────────── */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .brand-name {
    font-family: var(--font-ui);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -.02em;
    color: #fff;
  }

  .brand-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,184,109,.08);
    border: 1px solid rgba(232,184,109,.18);
    padding: 2px 8px;
    border-radius: 100px;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-icon {
    display: flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .04em;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all .18s;
  }

  .btn-icon:hover {
    border-color: rgba(232,184,109,.35);
    color: var(--accent);
    background: rgba(232,184,109,.04);
  }

  .btn-icon svg { width: 13px; height: 13px; }

  /* status dot */
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 8px rgba(74,222,128,.5);
    flex-shrink: 0;
  }
  .status-dot.offline { background: #f87171; box-shadow: 0 0 8px rgba(248,113,113,.5); }

  /* ── API key banner ───────────────────────────────────────────────────── */
  #key-banner {
    margin: 12px 24px;
    padding: 12px 16px;
    background: rgba(232,184,109,.06);
    border: 1px solid rgba(232,184,109,.22);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #key-banner label {
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }

  #key-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    min-width: 0;
  }

  #key-input::placeholder { color: var(--text-dim); }

  .btn-save {
    background: var(--accent);
    color: #0b0d11;
    border: none;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    padding: 6px 14px;
    border-radius: 7px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }

  .btn-save:hover { opacity: .85; }

  /* ── Thread ──────────────────────────────────────────────────────────── */
  #thread {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  #thread::-webkit-scrollbar { width: 4px; }
  #thread::-webkit-scrollbar-track { background: transparent; }
  #thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 40px;
  }

  .empty-icon {
    font-size: 36px;
    filter: grayscale(.3);
  }

  .empty-title {
    font-family: var(--font-ui);
    font-size: 22px;
    font-weight: 700;
    color: #fff;
  }

  .empty-sub {
    font-size: 12px;
    color: var(--text-dim);
    max-width: 260px;
    line-height: 1.6;
  }

  /* Bubbles */
  .bubble-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp .22s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble-row.user  { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    margin-top: 2px;
    font-family: var(--font-ui);
  }

  .bubble-row.user .avatar  { background: rgba(109,200,232,.15); color: var(--accent2); border: 1px solid rgba(109,200,232,.2); }
  .bubble-row.asst .avatar  { background: rgba(232,184,109,.1); color: var(--accent); border: 1px solid rgba(232,184,109,.18); }

  .bubble {
    max-width: 78%;
    padding: 11px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .bubble-row.user .bubble {
    background: var(--user-bg);
    border: 1px solid #242840;
    border-bottom-right-radius: 4px;
    color: #c8cfe0;
  }

  .bubble-row.asst .bubble {
    background: var(--asst-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  /* Cursor blink */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.6s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  /* Thinking row */
  .thinking-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    animation: fadeUp .22s ease both;
  }

  .thinking-dots {
    display: flex;
    gap: 4px;
  }

  .thinking-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(.65); opacity: .4; }
    40%           { transform: scale(1);   opacity: 1; }
  }

  .thinking-label {
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Error bubble */
  .error-bubble {
    background: rgba(248,113,113,.07);
    border: 1px solid rgba(248,113,113,.2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12.5px;
    color: #f87171;
    margin: 4px 0;
    animation: fadeUp .22s ease both;
  }

  /* ── Composer ────────────────────────────────────────────────────────── */
  .composer-wrap {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .composer {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px 10px 16px;
    transition: border-color .2s, box-shadow .2s;
  }

  .composer:focus-within {
    border-color: rgba(232,184,109,.35);
    box-shadow: var(--glow);
  }

  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-mono);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.6;
    max-height: 160px;
    min-height: 24px;
    overflow-y: auto;
  }

  #msg-input::placeholder { color: var(--text-dim); }
  #msg-input::-webkit-scrollbar { width: 3px; }
  #msg-input::-webkit-scrollbar-thumb { background: var(--border); }

  #send-btn {
    background: var(--accent);
    border: none;
    color: #0b0d11;
    width: 34px; height: 34px;
    border-radius: 9px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s, transform .1s;
  }

  #send-btn:hover:not(:disabled) { opacity: .85; }
  #send-btn:active:not(:disabled) { transform: scale(.94); }
  #send-btn:disabled { opacity: .3; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; }

  .hint-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 4px 0;
  }

  .hint {
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: .03em;
  }

  kbd {
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: var(--font-mono);
    font-size: 9.5px;
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Header -->
  <header>
    <div class="brand">
      <span class="brand-name">Claude</span>
      <span class="brand-tag">Streaming</span>
    </div>
    <div class="header-actions">
      <div class="status-dot" id="status-dot"></div>
      <button class="btn-icon" id="clear-btn" title="Clear conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
        </svg>
        Clear
      </button>
      <button class="btn-icon" id="history-btn" title="Toggle history panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        History
      </button>
    </div>
  </header>

  <!-- API Key Banner -->
  <div id="key-banner">
    <label>API Key</label>
    <input id="key-input" type="password" placeholder="sk-ant-…  (stored in memory only)" autocomplete="off" />
    <button class="btn-save" id="save-key-btn">Save</button>
  </div>

  <!-- Thread -->
  <div id="thread">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◈</div>
      <div class="empty-title">New Conversation</div>
      <div class="empty-sub">Type a message below. History persists for the session.</div>
    </div>
  </div>

  <!-- Composer -->
  <div class="composer-wrap">
    <div class="composer">
      <textarea id="msg-input" rows="1" placeholder="Send a message…" autocomplete="off" spellcheck="false"></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="hint-row">
      <span class="hint"><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> newline</span>
      <span class="hint" id="turn-count">0 turns</span>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const state = {
  apiKey: '',
  history: [],       // [{role, content}]
  streaming: false,
};

// ── DOM refs ──────────────────────────────────────────────────────────────────
const thread     = document.getElementById('thread');
const emptyState = document.getElementById('empty-state');
const msgInput   = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const keyInput   = document.getElementById('key-input');
const saveKeyBtn = document.getElementById('save-key-btn');
const keyBanner  = document.getElementById('key-banner');
const clearBtn   = document.getElementById('clear-btn');
const historyBtn = document.getElementById('history-btn');
const statusDot  = document.getElementById('status-dot');
const turnCount  = document.getElementById('turn-count');

// ── API key ───────────────────────────────────────────────────────────────────
saveKeyBtn.addEventListener('click', () => {
  const val = keyInput.value.trim();
  if (!val) return;
  state.apiKey = val;
  keyInput.value = '••••••••••••••••••••';
  keyBanner.style.borderColor = 'rgba(74,222,128,.3)';
  saveKeyBtn.textContent = '✓ Saved';
  saveKeyBtn.style.background = '#4ade80';
  statusDot.classList.remove('offline');
  setTimeout(() => {
    saveKeyBtn.textContent = 'Save';
    saveKeyBtn.style.background = '';
    keyBanner.style.borderColor = '';
  }, 2000);
  updateSendState();
});

keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveKeyBtn.click(); });

// ── Auto-resize textarea ──────────────────────────────────────────────────────
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  updateSendState();
});

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) handleSend();
  }
});

function updateSendState() {
  const ready = state.apiKey && msgInput.value.trim() && !state.streaming;
  sendBtn.disabled = !ready;
}

// ── Send ──────────────────────────────────────────────────────────────────────
sendBtn.addEventListener('click', handleSend);
clearBtn.addEventListener('click', clearHistory);
historyBtn.addEventListener('click', printHistory);

async function handleSend() {
  const text = msgInput.value.trim();
  if (!text || state.streaming || !state.apiKey) return;

  // Hide empty state
  emptyState.style.display = 'none';

  // Append user bubble
  appendBubble('user', text);

  // Clear input
  msgInput.value = '';
  msgInput.style.height = 'auto';
  updateSendState();

  // Push to history
  state.history.push({ role: 'user', content: text });

  await streamResponse();
}

// ── Stream response ───────────────────────────────────────────────────────────
async function streamResponse() {
  state.streaming = true;
  updateSendState();

  // Show thinking indicator
  const thinkingRow = appendThinking();

  let assistantBubble = null;
  let assembled = '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': state.apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        stream: true,
        messages: state.history,
      }),
    });

    // Remove thinking indicator as first token arrives (or on error)
    thinkingRow.remove();

    if (response.status === 401) {
      state.apiKey = '';
      statusDot.classList.add('offline');
      appendError('Authentication failed (401). Check your API key.');
      state.history.pop();
      return;
    }

    if (response.status === 429) {
      const retryAfter = response.headers.get('retry-after') || '10';
      appendError(`Rate limited (429). Retry in ${retryAfter}s.`);
      state.history.pop();
      return;
    }

    if (!response.ok) {
      const raw = await response.text();
      appendError(`API error ${response.status}: ${raw.slice(0, 200)}`);
      state.history.pop();
      return;
    }

    // Create assistant bubble
    assistantBubble = appendBubble('asst', '', true /* withCursor */);

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      let done, value;
      try {
        ({ done, value } = await reader.read());
      } catch {
        // Stream interrupted
        if (assistantBubble) {
          removeCursor(assistantBubble);
          appendError('Stream interrupted. Partial response shown above.');
        }
        break;
      }
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || !trimmed.startsWith('data: ')) continue;

        const data = trimmed.slice(6);
        if (data === '[DONE]') break;

        let event;
        try { event = JSON.parse(data); }
        catch { continue; }

        if (event.type === 'content_block_delta' && event.delta?.type === 'text_delta') {
          const token = event.delta.text || '';
          assembled += token;
          updateBubbleText(assistantBubble, assembled);
          scrollToBottom();
        }
      }
    }

    // Finalise
    if (assistantBubble) removeCursor(assistantBubble);

    if (assembled) {
      state.history.push({ role: 'assistant', content: assembled });
    }

  } catch (err) {
    thinkingRow.remove();
    if (err.name === 'TypeError' && err.message.includes('fetch')) {
      appendError('Network error: could not reach the API. Check your connection.');
    } else {
      appendError(`Unexpected error: ${err.message}`);
    }
    state.history.pop();
  } finally {
    state.streaming = false;
    updateSendState();
    updateTurnCount();
    scrollToBottom();
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function appendBubble(role, text, withCursor = false) {
  const row = document.createElement('div');
  row.className = `bubble-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  if (withCursor) {
    const cur = document.createElement('span');
    cur.className = 'cursor';
    bubble.appendChild(cur);
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  thread.appendChild(row);
  scrollToBottom();
  return bubble;
}

function updateBubbleText(bubble, text) {
  // Preserve cursor
  const cursor = bubble.querySelector('.cursor');
  bubble.textContent = text;
  if (cursor) bubble.appendChild(cursor);
}

function removeCursor(bubble) {
  const cursor = bubble.querySelector('.cursor');
  if (cursor) cursor.remove();
}

function appendThinking() {
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.innerHTML = `
    <div class="avatar" style="background:rgba(232,184,109,.1);color:var(--accent);border:1px solid rgba(232,184,109,.18);font-family:var(--font-ui);font-weight:700;font-size:11px;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;">AI</div>
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span class="thinking-label">Thinking</span>
  `;
  thread.appendChild(row);
  scrollToBottom();
  return row;
}

function appendError(msg) {
  const el = document.createElement('div');
  el.className = 'error-bubble';
  el.textContent = '⚠ ' + msg;
  thread.appendChild(el);
  scrollToBottom();
}

function scrollToBottom() {
  thread.scrollTop = thread.scrollHeight;
}

function clearHistory() {
  state.history = [];
  // Remove all children except empty state
  while (thread.firstChild) thread.removeChild(thread.firstChild);
  thread.appendChild(emptyState);
  emptyState.style.display = '';
  updateTurnCount();
}

function printHistory() {
  if (!state.history.length) { appendError('No conversation history yet.'); return; }
  const el = document.createElement('div');
  el.style.cssText = `padding:14px 16px;background:rgba(30,34,48,.7);border:1px solid var(--border);border-radius:var(--radius);margin:4px 0;font-size:11px;color:var(--text-dim);animation:fadeUp .22s ease both;`;
  el.innerHTML = `<div style="font-family:var(--font-ui);font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px;letter-spacing:.06em;text-transform:uppercase;">History — ${state.history.length} messages</div>` +
    state.history.map((m, i) =>
      `<div style="margin-bottom:5px;"><span style="color:${m.role==='user'?'var(--accent2)':'var(--accent)'}">[${i+1}] ${m.role}</span>: ${escapeHtml(m.content.slice(0, 120))}${m.content.length > 120 ? '…' : ''}</div>`
    ).join('');
  thread.appendChild(el);
  scrollToBottom();
}

function updateTurnCount() {
  const n = state.history.length / 2 | 0;
  turnCount.textContent = `${n} turn${n !== 1 ? 's' : ''}`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
